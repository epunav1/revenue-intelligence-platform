version: "3.9"

services:
  # -------------------------------------------------------------------------
  # Redis — velocity feature store & API rate limiting
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Fraud Detection API
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: fraud_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models_store:/app/models_store:ro
      - ./logs:/app/logs
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=/app/models_store/ensemble_model.joblib
      - FEATURE_PIPELINE_PATH=/app/models_store/feature_pipeline.joblib
      - DRIFT_REFERENCE_PATH=/app/models_store/reference_data.parquet
      - FRAUD_THRESHOLD=${FRAUD_THRESHOLD:-0.5}
      - HIGH_RISK_THRESHOLD=${HIGH_RISK_THRESHOLD:-0.8}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # -------------------------------------------------------------------------
  # Streamlit Dashboard
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: fraud_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - DASHBOARD_REFRESH_SEC=3
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Prometheus — metrics scraping
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fraud_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - api

  # -------------------------------------------------------------------------
  # Grafana — metrics visualization
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: fraud_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-fraudengine123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
    depends_on:
      - prometheus

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: fraud_network
